trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'
    displayName: Use Python 3.11

  - script: |
      python -m pip install --upgrade pip
      pip install pytest
    displayName: Install test dependencies

  - script: |
      mkdir -p tests
      if [ ! -f tests/test_placeholder.py ]; then
        cat > tests/test_placeholder.py <<'PY'
def test_placeholder_pipeline_runs():
    assert True
PY
      fi
      pytest -q
    displayName: Run placeholder tests

  - script: |
      echo "Pipeline placeholder completed successfully."
      echo "Future slices will add linting, unit tests, integration tests and evidence publication."
    displayName: Pipeline summary
